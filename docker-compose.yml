# Docker Compose kept only for production-like builds.
# Local dev uses local Postgres directly (see README).
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://host.docker.internal:5432/unknot
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
